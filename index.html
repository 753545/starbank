<!doctype html>
<html lang="en">
  <head>
    <!-- Other stuff like <title> is here... -->
  
    <!-- 1. Tells iOS to hide Safari UI and treat it as an app -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 2. Makes the top status bar (where the clock/battery is) blend in -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 3. The name that appears under the icon on the iPhone Desktop -->
    <meta name="apple-mobile-web-app-title" content="StarBank">
    
    <!-- 4. Prevents the user from double-tap zooming the screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
    <!-- Optional: Add an icon! Save a square image as apple-touch-icon.png in your public folder -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png"> -->
  </head>
    <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
