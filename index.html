<!doctype html>
<html lang="en">
  <head>
    <!-- Other stuff like <title> is here... -->
  
    <!-- 1. Tells iOS to hide Safari UI and treat it as an app -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 'black-translucent' allows the app to draw under the top status bar -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
      
    <!-- 3. The name that appears under the icon on the iPhone Desktop -->
    <meta name="apple-mobile-web-app-title" content="StarBank">
    
    <!-- 'viewport-fit=cover' tells the browser to stretch all the way into the notch/island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Optional: Add an icon! Save a square image as apple-touch-icon.png in your public folder -->
    <link rel="apple-touch-icon" href="/starbank/apple-touch-icon.png">
    <script type="module" crossorigin src="/starbank/assets/index-C1NcjSrt.js"></script>
    <link rel="stylesheet" crossorigin href="/starbank/assets/index-t0pTakM4.css">
  </head>
